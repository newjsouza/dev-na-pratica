<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1121"/>
      <stop offset="50%" stop-color="#1A1B3A"/>
      <stop offset="100%" stop-color="#0B1121"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0.5" x2="0.5" y2="1" gradientTransform="rotate(45)">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Glow effects -->
  <circle cx="200" cy="350" r="300" fill="#7C3AED" opacity="0.1" filter="url(#softGlow)"/>
  <circle cx="900" cy="250" r="250" fill="#06B6D4" opacity="0.08" filter="url(#softGlow)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#7C3AED" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="48" x2="1200" y2="48"/>
    <line x1="0" y1="96" x2="1200" y2="96"/>
    <line x1="0" y1="144" x2="1200" y2="144"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="288" x2="1200" y2="288"/>
    <line x1="0" y1="336" x2="1200" y2="336"/>
    <line x1="0" y1="384" x2="1200" y2="384"/>
    <line x1="0" y1="432" x2="1200" y2="432"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="528" x2="1200" y2="528"/>
    <line x1="0" y1="576" x2="1200" y2="576"/>
    <line x1="0" y1="624" x2="1200" y2="624"/>
    <line x1="0" y1="672" x2="1200" y2="672"/>
    <line x1="0" y1="0" x2="0" y2="675"/>
    <line x1="80" y1="0" x2="80" y2="675"/>
    <line x1="160" y1="0" x2="160" y2="675"/>
    <line x1="240" y1="0" x2="240" y2="675"/>
    <line x1="320" y1="0" x2="320" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/>
    <line x1="560" y1="0" x2="560" y2="675"/>
    <line x1="640" y1="0" x2="640" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/>
    <line x1="800" y1="0" x2="800" y2="675"/>
    <line x1="880" y1="0" x2="880" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/>
    <line x1="1040" y1="0" x2="1040" y2="675"/>
    <line x1="1120" y1="0" x2="1120" y2="675"/>
  </g>
  <!-- Stage/platform -->
  <rect x="100" y="370" width="1000" height="8" rx="4" fill="#7C3AED" opacity="0.3"/>
  <!-- Speaker silhouette (Andrew Yang) -->
  <g transform="translate(350, 180)">
    <!-- Body -->
    <ellipse cx="0" cy="120" rx="30" ry="55" fill="#F1F5F9" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="55" r="30" fill="#F1F5F9" opacity="0.9"/>
    <!-- Arms gesturing -->
    <line x1="30" y1="105" x2="80" y2="90" stroke="#F1F5F9" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="-30" y1="105" x2="-65" y2="85" stroke="#F1F5F9" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Presentation screens -->
  <g transform="translate(650, 150)">
    <!-- Big screen -->
    <rect x="0" y="0" width="400" height="225" rx="12" fill="#1A2332" stroke="#7C3AED" stroke-width="1.5" opacity="0.8"/>
    <!-- Screen glow -->
    <rect x="4" y="4" width="392" height="217" rx="10" fill="url(#accent2)"/>
    <!-- Screen content - data chart -->
    <rect x="30" y="40" width="160" height="120" rx="4" fill="#2A3548" opacity="0.6"/>
    <rect x="30" y="180" width="340" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
    <rect x="30" y="172" width="280" height="4" rx="2" fill="#06B6D4" opacity="0.3"/>
    <!-- Chart bars -->
    <rect x="50" y="130" width="25" height="30" rx="3" fill="#7C3AED" opacity="0.7"/>
    <rect x="85" y="100" width="25" height="60" rx="3" fill="#06B6D4" opacity="0.7"/>
    <rect x="120" y="115" width="25" height="45" rx="3" fill="#7C3AED" opacity="0.5"/>
    <rect x="155" y="70" width="25" height="90" rx="3" fill="#06B6D4" opacity="0.5"/>
    <!-- Line chart -->
    <polyline points="30,50 80,48 130,35 180,40 230,25 280,30 340,20" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
    <polyline points="30,55 80,52 130,45 180,48 230,38 280,42 340,35" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.4"/>
    <!-- Audience light reflection on screen -->
    <ellipse cx="300" cy="180" rx="60" ry="30" fill="#7C3AED" opacity="0.05"/>
  </g>
  <!-- Floating data nodes -->
  <g opacity="0.15">
    <circle cx="150" cy="180" r="4" fill="#06B6D4"/>
    <circle cx="160" cy="175" r="2" fill="#06B6D4"/>
    <circle cx="145" cy="188" r="2" fill="#06B6D4"/>
    <circle cx="1050" cy="450" r="3" fill="#7C3AED"/>
    <circle cx="1042" cy="442" r="1.5" fill="#7C3AED"/>
    <circle cx="1058" cy="458" r="1.5" fill="#7C3AED"/>
  </g>
  <!-- Connecting data lines -->
  <g opacity="0.06" stroke="#7C3AED" stroke-width="1">
    <line x1="350" y1="290" x2="650" y2="262"/>
    <line x1="350" y1="295" x2="650" y2="270"/>
    <line x1="350" y1="300" x2="650" y2="278"/>
  </g>
  <!-- Bottom gradient fade -->
  <rect x="0" y="550" width="1200" height="125" fill="url(#glow)" opacity="0.3"/>
  <!-- Title card overlay -->
  <g transform="translate(0, 480)">
    <rect x="600" y="0" width="600" height="195" fill="#0B1121" opacity="0.7" rx="0"/>
    <text x="630" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#7C3AED" letter-spacing="2">CONFERÊNCIA IA · 2026</text>
    <text x="630" y="70" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F1F5F9">O que Andrew Yang viu</text>
    <text x="630" y="100" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F1F5F9">nos bastidores da</text>
    <text x="630" y="130" font-family="Inter, sans-serif" font-size="28" font-weight="800">
      <tspan fill="#7C3AED">IA</tspan>
      <tspan fill="#F1F5F9"> em 2026</tspan>
    </text>
    <text x="630" y="160" font-family="Inter, sans-serif" font-size="15" fill="#94A3B8">Análise editorial · NeuroPonto</text>
  </g>
</svg>
